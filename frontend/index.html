<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Management Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">📦</span>
      <div>
        <span class="logo-text">OrderHub</span>
        <span class="logo-sub">Management</span>
      </div>
    </div>

    <div class="sidebar-section">Generale</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-link active" data-page="dashboard">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </a>
    </nav>

    <div class="sidebar-section">Anagrafica</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-link" data-page="clienti">
        <span class="nav-icon">👥</span><span>Clienti</span>
      </a>
      <a href="#" class="nav-link" data-page="fornitori">
        <span class="nav-icon">🏭</span><span>Fornitori</span>
      </a>
      <a href="#" class="nav-link" data-page="prodotti">
        <span class="nav-icon">🏷️</span><span>Prodotti</span>
      </a>
    </nav>

    <div class="sidebar-section">Vendite</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-link" data-page="ordini">
        <span class="nav-icon">🛒</span><span>Ordini</span>
      </a>
      <a href="#" class="nav-link" data-page="dettagli">
        <span class="nav-icon">📋</span><span>Righe Ordine</span>
      </a>
    </nav>

    <div class="sidebar-section">Magazzino</div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-link" data-page="magazzino">
        <span class="nav-icon">🏪</span><span>Giacenze</span>
      </a>
      <a href="#" class="nav-link" data-page="movimenti">
        <span class="nav-icon">🔄</span><span>Movimenti</span>
      </a>
    </nav>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <span class="topbar-date" id="topbarDate"></span>
    </header>
    <main class="content" id="content"></main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" id="modalClose">✕</button>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Socket.IO: aggiornamenti in tempo reale -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
